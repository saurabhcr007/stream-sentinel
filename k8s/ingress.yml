apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stream-sentinel-ingress
  namespace: stream-sentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Enable WebSockets for the API gateway
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: sentinel.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: stream-sentinel-api-gateway
                port:
                  number: 80
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: stream-sentinel-api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stream-sentinel-frontend
                port:
                  number: 80
